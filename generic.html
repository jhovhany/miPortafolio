<!doctype html>
<html lang="es">
  <head>
    <title>Jhovhany</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="shortcut icon" href="./images/code.png">
    <script>
      (function () {
        try {
          var storedTheme = localStorage.getItem('portfolio-theme');
          var storedLanguage = localStorage.getItem('portfolio-language');
          var language = storedLanguage === 'en' || storedLanguage === 'es' ? storedLanguage : 'es';

          document.documentElement.dataset.theme = storedTheme === 'day' || storedTheme === 'night' ? storedTheme : 'night';
          document.documentElement.dataset.language = language;
          document.documentElement.lang = language;
        } catch (error) {
          document.documentElement.dataset.theme = 'night';
          document.documentElement.dataset.language = 'es';
          document.documentElement.lang = 'es';
        }
      })();
    </script>
  </head>
  <body>
    <div id="cv-app"></div>
    <script type="module" src="/src/curriculum.js"></script>
  </body>
</html>
